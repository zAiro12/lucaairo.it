# playme.lucaairo.it

<VirtualHost *:80>
    ServerName playme.lucaairo.it
    Redirect permanent / https://playme.lucaairo.it/
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin io@lucaairo.it
    ServerName playme.lucaairo.it

    DocumentRoot /var/www/html/playme

    ErrorLog ${APACHE_LOG_DIR}/playme-error.log
    CustomLog ${APACHE_LOG_DIR}/playme-access.log combined

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/playme.lucaairo.it/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/playme.lucaairo.it/privkey.pem

    <Directory /var/www/html/playme>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteRule ^service-worker\.js$ - [L]
        RewriteRule ^manifest\.webmanifest$ - [L]
        RewriteRule ^manifest\.json$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    AddType application/manifest+json .webmanifest

    SetEnvIf Origin "^(https?://(?:.*\.)?lucaairo\.it(:[0-9]+)?|https?://localhost(:[0-9]+)?)$" allowed_origin=$0
    Header always set Access-Control-Allow-Origin "%{allowed_origin}e" env=allowed_origin
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
    Header always set Access-Control-Allow-Credentials "true"
    Header merge Vary "Origin"

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <FilesMatch "^(index\.html|service-worker\.js|manifest\.webmanifest|manifest\.json)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </FilesMatch>

    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    <Files "service-worker.js">
        Header always set Service-Worker-Allowed "/"
    </Files>
</VirtualHost>
